name: Create release # You may choose a different name
run-name: ${{ inputs.releaseversion }} # Enumerates entries in the "workflow runs" view
on:
  workflow_dispatch:
    inputs:
      releaseversion:
        description: 'Release version'
        required: true
        type: string
        default: 'X.Y.Z'

jobs:
  release: # Arbitrarily chosen
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure Git author
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'

      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # As good as any other, see: https://github.com/actions/setup-java#supported-distributions
          java-package: 'jdk'
          java-version: '21'
          check-latest: true
          cache: 'maven'

      - name: Setup settings.xml
        uses: s4u/maven-settings-action@v4.0.0
        with:
          override: true
          servers: |
            [{
                "id": "central",
                "username": "${{ secrets.OSS_SONATYPE_USER }}",
                "password": "${{ secrets.OSS_SONATYPE_PASS }}"
            },{
                "id":"github",
                "username": "ci-bot",
                "password": "${{ secrets.GITHUB_TOKEN }}"
            }]

      - id: install-secret-key
        name: Install gpg secret key
        run: |
          # Install gpg secret key
          cat <(echo -e "${{ secrets.OSS_SONATYPE_GPG_PRIVATE_KEY }}") | gpg --batch --import
          # Verify gpg secret key
          gpg --list-secret-keys --keyid-format LONG

      - name: Publish maven package
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          MAVEN_GPG_KEY: ${{ secrets.OSS_SONATYPE_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.OSS_SONATYPE_GPG_PASSPHRASE }}
        run: |
          export TZ="Europe/Berlin"
          cd packages/maven/
          ./mvnw release:prepare release:perform -B -DreleaseVersion=${{ inputs.releaseversion }} -DpushChanges=false -DlocalCheckout -Darguments="-DpushChanges=false"
          # # TODO: Sonatype publish
          # ./mvnw release:prepare release:perform -B -Pcentral-publish -DreleaseVersion=${{ inputs.releaseversion }} -DpushChanges=false -DlocalCheckout -Darguments="-DpushChanges=false"

      - name: Publish npm package
        run: |
          npm version --no-git-tag-version ${{ github.event.inputs.releaseversion }}
          npm i
          cd packages/npm/
          npm ci
          npm run clean
          npm version --no-git-tag-version ${{ github.event.inputs.releaseversion }}
          npm i
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Push changes
        run: |
          git add package.json
          git add package-lock.json
          git add packages/
          git commit -m "chore: Release ${{ github.event.inputs.releaseversion }}" || true

      - name: Conventional Changelog Action
        uses: TriPSs/conventional-changelog-action@v6
        with:
          input-file: CHANGELOG.md
          github-token: ${{ steps.app-token.outputs.token }}
          version-file: package.json
          pre-release: true
          skip-bump: true
          skip-tag: true
          skip-on-empty: true
          tag-prefix: 'v'

      - name: Create GH release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ github.event.inputs.releaseversion }}
          tag_name: v${{ github.event.inputs.releaseversion }}
          draft: true
